<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ANDRES</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0002;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Arial Black', Impact, sans-serif;
    }

    /* Grid floor — tinte rojo */
    .grid {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(220,30,30,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(220,30,30,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
      transform: perspective(600px) rotateX(60deg) translateY(40%);
      transform-origin: bottom center;
      animation: gridPulse 4s ease-in-out infinite;
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* Glow de fondo rojo/blanco */
    .glow-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 40% at 50% 55%, rgba(220,20,20,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 48%, rgba(255,255,255,0.06) 0%, transparent 60%);
      animation: breathe 5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1);   opacity: 0.7; }
      50%       { transform: scale(1.08); opacity: 1; }
    }

    /* Nombre */
    .name-wrapper {
      position: relative;
      z-index: 10;
      text-align: center;
      user-select: none;
    }

    .name {
      font-size: clamp(80px, 18vw, 220px);
      font-weight: 900;
      letter-spacing: 0.12em;
      color: #fff;
      position: relative;
      display: inline-block;
      text-transform: uppercase;
      text-shadow:
        0 0 15px  rgba(255, 255, 255, 1),
        0 0 30px  rgba(255, 60,  60,  0.9),
        0 0 60px  rgba(220, 20,  20,  0.8),
        0 0 120px rgba(180, 0,   0,   0.6),
        0 0 200px rgba(150, 0,   0,   0.3),
        3px  3px 0 rgba(220, 20, 20, 0.5),
        6px  6px 0 rgba(180, 10, 10, 0.35),
        9px  9px 0 rgba(140, 0,  0,  0.2);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        text-shadow:
          0 0 15px  rgba(255, 255, 255, 1),
          0 0 30px  rgba(255, 60,  60,  0.9),
          0 0 60px  rgba(220, 20,  20,  0.8),
          0 0 120px rgba(180, 0,   0,   0.6),
          0 0 200px rgba(150, 0,   0,   0.3),
          3px  3px 0 rgba(220, 20, 20, 0.5),
          6px  6px 0 rgba(180, 10, 10, 0.35),
          9px  9px 0 rgba(140, 0,  0,  0.2);
      }
      50% {
        text-shadow:
          0 0 25px  rgba(255, 255, 255, 1),
          0 0 50px  rgba(255, 80,  80,  1),
          0 0 100px rgba(220, 30,  30,  0.9),
          0 0 180px rgba(200, 0,   0,   0.7),
          0 0 280px rgba(160, 0,   0,   0.4),
          3px  3px 0 rgba(220, 20, 20, 0.6),
          6px  6px 0 rgba(180, 10, 10, 0.45),
          9px  9px 0 rgba(140, 0,  0,  0.3);
      }
    }

    /* Aberración cromática: rojo izq, blanco der */
    .name::before,
    .name::after {
      content: 'ANDRES';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name::before {
      color: rgba(255, 30, 30, 0.4);
      transform: translate(-5px, 1px);
      animation: chromaR 4s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    .name::after {
      color: rgba(255, 220, 220, 0.3);
      transform: translate(5px, -1px);
      animation: chromaW 4s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    @keyframes chromaR {
      0%, 100% { transform: translate(-5px,  1px); }
      50%       { transform: translate(-9px,  3px); }
    }

    @keyframes chromaW {
      0%, 100% { transform: translate(5px, -1px); }
      50%       { transform: translate(9px, -3px); }
    }

    /* Destellos / chispas */
    .sparks {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 15;
    }

    .spark {
      position: absolute;
      border-radius: 50%;
      animation: sparkLife var(--dur) ease-out var(--delay) infinite;
      opacity: 0;
    }

    @keyframes sparkLife {
      0%   { transform: translate(0,0) scale(0);   opacity: 0; }
      15%  { opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0.2); opacity: 0; }
    }

    /* Banda diagonal River */
    .band {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(
        135deg,
        transparent 35%,
        rgba(220, 20, 20, 0.04) 35%,
        rgba(220, 20, 20, 0.04) 50%,
        transparent 50%
      );
      pointer-events: none;
      z-index: 4;
      animation: bandShimmer 6s ease-in-out infinite;
    }

    @keyframes bandShimmer {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1.0; }
    }

    /* Scan line */
    .scanline {
      position: fixed;
      top: -40%;
      left: 0; right: 0;
      height: 40%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255,255,255,0.025) 50%,
        transparent 100%
      );
      animation: scan 6s linear infinite;
      pointer-events: none;
      z-index: 20;
    }

    @keyframes scan {
      0%   { top: -40%; }
      100% { top: 100%; }
    }

    /* CRT fino */
    .crt {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.12) 2px,
        rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
      z-index: 30;
    }

    /* Reflejo */
    .mirror {
      font-size: clamp(80px, 18vw, 220px);
      font-weight: 900;
      letter-spacing: 0.12em;
      transform: scaleY(-1);
      display: block;
      margin-top: -0.08em;
      background: linear-gradient(to bottom, rgba(255,80,80,0.15), transparent 55%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(1.5px);
    }

    /* Viñeta */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 35%,
        rgba(0,0,0,0.75) 100%);
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow-bg"></div>
  <div class="band"></div>
  <div class="vignette"></div>
  <div class="scanline"></div>
  <div class="crt"></div>
  <div class="sparks" id="sparks"></div>

  <div class="name-wrapper">
    <span class="name">ANDRES</span>
    <span class="mirror" aria-hidden="true">ANDRES</span>
  </div>

  <script>
    const sparks = document.getElementById('sparks');
    const W = window.innerWidth, H = window.innerHeight;
    const cx = W / 2, cy = H / 2;
    const colors = ['#fff','#ff2222','#ff6666','#ffaaaa','#ffffff','#dd0000','#ff4444'];

    for (let i = 0; i < 55; i++) {
      const el = document.createElement('div');
      el.className = 'spark';

      const size = Math.random() * 6 + 2;
      const angle = Math.random() * Math.PI * 2;
      const dist  = Math.random() * 340 + 60;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist - Math.random() * 120;
      const dur  = (Math.random() * 2 + 1.2).toFixed(2) + 's';
      const delay= (Math.random() * 4).toFixed(2) + 's';
      const color = colors[Math.floor(Math.random() * colors.length)];

      el.style.cssText = `
        width:${size}px; height:${size}px;
        background:${color};
        box-shadow: 0 0 ${size*2}px ${color};
        left:${cx + (Math.random()-0.5)*260}px;
        top:${cy + (Math.random()-0.5)*120}px;
        --tx:${tx}px; --ty:${ty}px;
        --dur:${dur}; --delay:${delay};
      `;
      sparks.appendChild(el);
    }
  </script>
</body>
</html>
